<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>メンバー用ログインフォーム</title>
    <link rel="stylesheet" href="./../../../css/global.css">
    <link rel="stylesheet" href="./login.css">
</head>

<body>
    <main>
        <div class="front-contents">
            <img src="./../../../img/EDTC-icon.webp" alt="" width="100" height="100">
            <h1>ログイン</h1>
        </div>

        <div class="form-container">
            <form id="login-form">
                <div class="form-group">
                    <label for="student-id">ID</label>
                    <input type="text" id="student-id" name="user_id" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label for="password">パスワード</label>
                    <input type="password" id="passwd" name="password" required>
                </div>
                <div class="form-group">
                    <input type="submit" value="ログイン" class="btn-login" id="btn-login">
                </div>
            </form>
            <a href="https://kaitedtc.com/">HPトップに戻る</a>
        </div>
    </main>

    <!-- API Client と Auth Service を先に読み込む -->
    <script src="../../lib/api-client.js"></script>
    <script src="../../lib/services/auth-service.js"></script>
    <script src="../../lib/utils.js"></script>
    <script src="./login.js"></script>
</body>

</html>
