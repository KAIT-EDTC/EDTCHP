<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ</title>
    <link rel="stylesheet" href="./mypage.css">
    <link rel="stylesheet" href="./../../lib/hamburger.css">
    <link rel="stylesheet" href="./../../../css/global.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
</head>

<body style="display:none;">
    <div class="breadcrumbs" id="breadcrumbs">
        <a href="./../../../base.html">ホーム</a>
        <i class="fa fa-angle-right"></i>
        <a href="">マイページ</a>
    </div>

    <h1 id="greeting"><span id="user-name"></span>さんこんにちは！</h1>

    <div id="event-list-container">
        <h2>イベント一覧</h2>
        <p id="no-events">表示できるイベントがありません。</p>
        <table id="event-list-table">
            <thead>
                <tr>
                    <th>イベント名</th>
                    <th>日時</th>
                    <th>詳細</th>
                    <th>参加者</th>
                </tr>
            </thead>
            <tbody id="event-list">
                <!-- イベントデータが表示されます -->
            </tbody>
        </table>
    </div>

    <div id="calender">
        <h2>カレンダー</h2>
        <iframe 
            src="https://calendar.google.com/calendar/embed?src=6bc8d4c70139097818ef94f5abc1439ec71bb2f72ba59e062cb5f452ebc32ece%40group.calendar.google.com&ctz=Asia%2FTokyo" 
            style="border-width: 0" 
            width="100%" 
            height="600" 
            frameborder="0" 
            scrolling="no"
        ></iframe>
    </div>
    <div class="footer-links">
        <a href="./../../../base.html">ホームに戻る</a>
    </div>

    <script src="../../lib/api-client.js"></script>
    <script src="../../lib/services/auth-service.js"></script>
    <script src="../../lib/auth.js"></script>
    <script src="../../lib/services/event-service.js"></script>
    <script src="./../../lib/utils.js"></script>
    <script src="./auth.js"></script>
    <script src="./fetch-event.js"></script>
    <script src="./../../lib/hamburger.js"></script>
</body>

</html>
