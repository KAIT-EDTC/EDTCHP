<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ</title>
    <link rel="stylesheet" href="./mypage.css">
    <link rel="stylesheet" href="./../../../css/global.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
</head>

<body>
    <div class="breadcrumbs" id="breadcrumbs">
        <a href="./../../../base.html">ホーム</a>
        <i class="fa fa-angle-right"></i>
        <a href="">マイページ</a>
    </div>

    <!-- ローディング表示 -->
    <div id="loading">
        <p>読み込み中...</p>
    </div>

    <!-- ログイン前の表示（未ログイン時） -->
    <div id="not-logged-in" style="display: none;">
        <h1>ログインが必要です</h1>
        <p><a href="../login/">ログインページへ</a></p>
    </div>

    <!-- ログイン後の表示（ログイン済み時） -->
    <div id="logged-in-content" style="display: none;">
        <h1><span id="user-name"></span>さんこんにちは！</h1>

        <div id="event-list-container">
            <h2>イベント一覧</h2>
            <p id="no-events" style="display: none;">表示できるイベントがありません。</p>
            <table id="event-list-table" style="display: none;">
                <thead>
                    <tr>
                        <th>イベント名</th>
                        <th>日時</th>
                        <th>詳細</th>
                        <th>参加者</th>
                    </tr>
                </thead>
                <tbody id="event-list">
                    <!-- イベントデータが表示されます -->
                </tbody>
            </table>
        </div>

        <div id="calender">
            <h2>カレンダー</h2>
            <iframe 
                src="https://calendar.google.com/calendar/embed?src=a23bec7bb1a50a07c46df692888fee89c66547fedf575d44f1a333f8804848c1%40group.calendar.google.com&ctz=Asia%2FTokyo" 
                style="border-width: 0" 
                width="100%" 
                height="600" 
                frameborder="0" 
                scrolling="no"
            ></iframe>
        </div>
        <div>
            <a href="./../../../base.html">ホームに戻る</a>
            <button id="logout-btn">ログアウト</button>
        </div>

        <div id="admin-menu" style="display: none;">
            <a href="./../admin/">管理者メニュー</a>
        </div>
    </div>

    <script src="../../lib/api-client.js"></script>
    <script src="../../lib/services/auth-service.js"></script>
    <script src="../../lib/services/event-service.js"></script>
    <script src="./../../lib/utils.js"></script>
    <script src="./auth.js"></script>
    <script src="./fetch-event.js"></script>
</body>

</html>
