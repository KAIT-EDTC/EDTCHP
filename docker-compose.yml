version: '3.8'

services:
  web:
    build: .
    container_name: edtchp-web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - edtchp-network

  db:
    image: mysql:8.0
    container_name: edtchp-db
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - edtchp-network

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: edtchp-pma
    env_file:
      - .env
    ports:
      - "8888:80"
    depends_on:
      - db
    networks:
      - edtchp-network

networks:
  edtchp-network:

volumes:
  db_data:
