<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">ブログ|神奈川工科大学EDTC</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/headfoot.css">
    <link rel="stylesheet" href="css/blog-temp.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
    <!-- icon link tag -->
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.webp">
</head>

<body data-base-path="./">
    <!-- ヘッダー: loadCommon.js により動的挿入 -->
    <div id="common-header"></div>

    <main>
        <!-- パンくずリスト -->
        <div class="breadcrumbs">
            <a href="./blog.html">ブログ</a>
            <i class="fa fa-angle-right"></i>
            <a href="" id="breadcrumb-title"></a>
        </div>

        <!-- タイトル・日付 (blogPostRenderer.js が設定) -->
        <div class="blog-title" id="blog-title"></div>
        <div class="blog-date" id="blog-date"><i class="fa fa-clock-o"></i></div>

        <!-- 本文エリア -->
        <div class="blog-body">
            <div class="blog-main" id="blog-main">
                <!-- blogPostRenderer.js がJSONデータからレンダリング -->
            </div>
            <!-- サイドバー (PC表示のみ) -->
            <div class="pc-only">
                <div class="side-menu">
                    <div class="Archives">
                        <h3><i class="fa fa-list"></i> 他の記事もどうぞ！</h3>
                        <script type="module" src="./script/blog/archiveListRenderer.js"></script>
                    </div>
                </div>
            </div>
        </div>

        <div id="prev"><a href="./blog.html"><i class="fa fa-arrow-left"></i> ブログトップへ戻る</a></div>
    </main>

    <!-- フッター: loadCommon.js により動的挿入 -->
    <div id="common-footer"></div>

    <script type="module" src="./script/loadCommon.js"></script>
    <script type="module" src="./script/blog/blogPostRenderer.js"></script>
</body>

</html>
